version: "3.9"

services:

  # ── MariaDB ─────────────────────────────────────────────────────────────────
  mariadb:
    image: mariadb:11
    container_name: solar_mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MARIADB_DATABASE:      solar_distribution
      MARIADB_USER:          solar_user
      MARIADB_PASSWORD:      ${DB_PASSWORD:-solarpass}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - solar_net

  # ── Solar Distribution API ───────────────────────────────────────────────────
  solar_api:
    build:
      context: .
      dockerfile: Dockerfile.Api
    container_name: solar_api
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT:     Production
      ASPNETCORE_URLS:            http://+:8080
      TZ:                         ${TZ:-Europe/Brussels}
      # ── Database
      ConnectionStrings__MariaDb: "Server=mariadb;Port=3306;Database=solar_distribution;User=solar_user;Password=${DB_PASSWORD:-solarpass};CharSet=utf8mb4;"
      # ── Swagger
      Swagger__Enabled:           "true"
      Swagger__RoutePrefix:       "swagger"
      Swagger__ApiKey__Enabled:   "${SWAGGER_APIKEY_ENABLED:-false}"
      Swagger__ApiKey__Key:       "${SWAGGER_APIKEY_KEY}"
      # ── CORS
      Cors__AllowAnyOrigin:       "${CORS_ALLOW_ANY:-false}"
      Cors__AllowedOrigins__0:    "${CORS_ORIGIN_0:-http://localhost:3000}"
      Cors__AllowedOrigins__1:    "${CORS_ORIGIN_1:-http://localhost:5173}"
    volumes:
      - solar_data:/app/ml_models
    networks:
      - solar_net

  # ── Solar Distribution Worker ────────────────────────────────────────────────
  solar_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solar_worker
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      CONFIG_PATH:         /config/config.yaml
      DOTNET_ENVIRONMENT:  Production
      TZ:                  ${TZ:-Europe/Brussels}
    volumes:
      # config.yaml — ÉDITER CE CHEMIN selon votre machine hôte
      - ./config:/config:ro
      # Données persistées : modèles ML + logs
      - solar_data:/data
    networks:
      - solar_net

volumes:
  mariadb_data:
  solar_data:

networks:
  solar_net:
    driver: bridge
