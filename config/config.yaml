# ═══════════════════════════════════════════════════════════════════════════════
# SolarDistribution Worker — Configuration
# Monter ce fichier dans le container : ./config/config.yaml → /config/config.yaml
# ═══════════════════════════════════════════════════════════════════════════════

# ── Home Assistant ─────────────────────────────────────────────────────────────
home_assistant:
  url: "http://192.168.1.100:8123"
  token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.VOTRE_TOKEN_ICI"
  timeout_seconds: 10
  retry_count: 3

# ── Polling ────────────────────────────────────────────────────────────────────
polling:
  interval_seconds: 60
  dry_run: true           # ← mettre false en production
  min_change_trigger_w: 10

# ── Localisation (pour météo Open-Meteo) ──────────────────────────────────────
location:
  latitude:  50.85    # Bruxelles — adapter à votre emplacement
  longitude:  4.35

# ── Production solaire ─────────────────────────────────────────────────────────
#
# surplus_mode : comment lire le surplus disponible pour charger les batteries.
#
#   direct    (défaut) : l'entité expose directement le surplus en W (>= 0).
#                        ex: un sensor dédié de votre onduleur ou template HA.
#
#   p1_invert          : l'entité est la puissance réseau de votre compteur P1/DSMR.
#                        La valeur est NÉGATIVE quand vous exportez (surplus disponible)
#                        et POSITIVE quand vous importez depuis le réseau.
#                        Le Worker inverse automatiquement le signe.
#
#                        Exemple avec compteur P1 (Linky, DSMR, P1 Dongle...) :
#                          sensor.p1_power = -1360 W  =>  surplus = 1360 W
#                          sensor.p1_power =  +800 W  =>  surplus = 0 W (import)
#
#   +---------------------------------------------------------------------------+
#   |  Entités HA selon votre installation                                      |
#   |                                                                           |
#   |  Compteur P1 / DSMR (mode p1_invert) :                                  |
#   |    P1 Dongle, ISKRA, Sagemcom, Linky via Enedis...                       |
#   |    Dans HA chercher : "Puissance" / "Power" / "Active power"             |
#   |    La valeur négative = export = surplus => parfait pour p1_invert       |
#   |                                                                           |
#   |  Onduleur solaire avec sensor dédié (mode direct) :                      |
#   |    Fronius, SMA, SolarEdge, SolaX, GivEnergy...                         |
#   |    Chercher : "Export power" / "Grid feed-in" / "Surplus"               |
#   +---------------------------------------------------------------------------+
#
solar:
  # Mode p1_invert : utilise la puissance réseau du compteur P1.
  # Remplacer par "direct" si vous avez un sensor de surplus dédié.
  surplus_mode: "p1_invert"

  # Entité HA de la puissance réseau (compteur P1).
  # Trouver le bon entity_id : HA -> Outils de développement -> États -> chercher "Puissance"
  # Exemples selon intégration :
  #   P1 Dongle (DSMR)      : sensor.p1_power
  #   Shelly EM             : sensor.shelly_em_channel_1_power
  #   Fronius Smart Meter   : sensor.fronius_grid_power
  #   Intégration générique : sensor.power_phase_1
  surplus_entity: "sensor.YOUR_P1_POWER_ENTITY"

  # Entité de production PV brute (optionnel — pour le logging et le ML).
  # ex: sensor.onduleur_puissance_active, sensor.solar_active_power
  production_entity: "sensor.YOUR_PV_ACTIVE_POWER_ENTITY"

  # Entité de consommation maison (optionnel).
  # Pas nécessaire en mode p1_invert : la consommation est implicite dans P1.
  # consumption_entity: "sensor.home_consumption_power"

# ── Batteries ──────────────────────────────────────────────────────────────────
batteries:

  - id: 1
    name: "Batterie Principale"
    priority: 1
    capacity_wh: 10000

    # Puissance max de recharge en W — valeur STATIQUE de sécurité.
    # Utilisée si max_charge_rate_entity n'est pas configurée ou si la lecture échoue.
    max_charge_rate_w: 3000

    min_percent: 20       # En-dessous = URGENT (priorité 0)
    soft_max_percent: 80  # Cible normale (ajustée dynamiquement par ML)
    hard_max_percent: 100 # Plafond absolu

    entities:
      soc: "sensor.battery_main_state_of_charge"
      charge_power: "number.battery_main_charge_power"

      # OPTIONNEL — puissance max de recharge lue dynamiquement depuis HA.
      # Écrase max_charge_rate_w si disponible. Utile si le BMS ajuste la limite
      # selon la température ou l'état de santé.
      # max_charge_rate_entity: "sensor.battery_main_max_charge_power_w"
      max_rate_read_multiplier: 1.0   # 48.0 si l'entité expose des Ampères sur 48V

      # OPTIONNEL — switch pour activer/désactiver la recharge
      # charge_switch: "switch.battery_main_charge_enable"

      # Multiplicateur si HA attend des Ampères plutôt que des Watts
      # Exemple batterie 48V : value_multiplier: 0.02083  (W / 48 = A)
      value_multiplier: 1.0
      value_unit: "W"

      # ── Actions conditionnelles (OPTIONNEL) ─────────────────────────────────
      #
      # zero_w_actions   : liste d'actions HA exécutées quand AllocatedW == 0
      #                     (aucun surplus → batterie ne charge pas)
      # non_zero_w_actions: liste d'actions HA exécutées quand AllocatedW > 0
      #                     (surplus disponible → batterie charge)
      #
      # Chaque action a les champs suivants :
      #
      #   type      (obligatoire) :
      #     "turn_on"  → homeassistant/turn_on  { entity_id }
      #     "turn_off" → homeassistant/turn_off { entity_id }
      #     "service"  → appel libre avec domain + service + data (JSON)
      #
      #   entity_id (pour turn_on / turn_off) : entité HA ciblée
      #   domain    (pour service) : domaine HA, ex: "input_boolean", "script"
      #   service   (pour service) : service HA, ex: "turn_on", "trigger"
      #   data      (pour service) : payload JSON libre, ex: { entity_id: "..." }
      #   label     (optionnel)    : nom affiché dans les logs
      #
      # ┌─────────────────────────────────────────────────────────────────────┐
      # │  EXEMPLE EcoFlow Delta 3 — self-powered mode                       │
      # │                                                                     │
      # │  Quand 0W : activer self-powered → EcoFlow alimente la maison      │
      # │  Quand > 0W : désactiver self-powered → onduleur solaire recharge  │
      # └─────────────────────────────────────────────────────────────────────┘
      #
      # zero_w_actions:
      #   - type: turn_on
      #     entity_id: "switch.delta3_salon_self_powered_mode"
      #     label: "EcoFlow self-powered ON"
      #
      # non_zero_w_actions:
      #   - type: turn_off
      #     entity_id: "switch.delta3_salon_self_powered_mode"
      #     label: "EcoFlow self-powered OFF"
      #
      # ┌─────────────────────────────────────────────────────────────────────┐
      # │  EXEMPLE avancé — script HA + notification                         │
      # └─────────────────────────────────────────────────────────────────────┘
      #
      # zero_w_actions:
      #   - type: turn_on
      #     entity_id: "switch.delta3_salon_self_powered_mode"
      #     label: "EcoFlow self-powered ON"
      #   - type: service
      #     domain: "notify"
      #     service: "mobile_app_mon_telephone"
      #     data:
      #       message: "EcoFlow en mode self-powered (0W solaire)"
      #     label: "Notification self-powered"
      #
      # non_zero_w_actions:
      #   - type: turn_off
      #     entity_id: "switch.delta3_salon_self_powered_mode"
      #     label: "EcoFlow self-powered OFF"
      #   - type: service
      #     domain: "script"
      #     service: "turn_on"
      #     data:
      #       entity_id: "script.ecoflow_charge_mode_actif"
      #     label: "Script charge active"

  - id: 2
    name: "Batterie Secondaire"
    priority: 2
    capacity_wh: 5000
    max_charge_rate_w: 2000
    min_percent: 20
    soft_max_percent: 80
    hard_max_percent: 100

    entities:
      soc: "sensor.battery_secondary_state_of_charge"
      charge_power: "number.battery_secondary_charge_power"
      max_rate_read_multiplier: 1.0
      value_multiplier: 1.0
      value_unit: "W"

      # Exemple EcoFlow Delta 3 — self-powered mode
      # Décommenter et adapter les entity_id selon votre installation.
      #
      # zero_w_actions:
      #   - type: turn_on
      #     entity_id: "switch.delta3_salon_self_powered_mode"
      #     label: "EcoFlow Delta 3 self-powered ON (0W surplus)"
      #
      # non_zero_w_actions:
      #   - type: turn_off
      #     entity_id: "switch.delta3_salon_self_powered_mode"
      #     label: "EcoFlow Delta 3 self-powered OFF (surplus disponible)"

# ── Tarification électrique ────────────────────────────────────────────────────
#
# OBJECTIF : maximiser l'autoconsommation.
#   - Pendant la production solaire → charge DEPUIS le surplus, jamais depuis le réseau.
#   - Hors production + tarif bas → charge DEPUIS le réseau pour éviter d'acheter
#     en heure pleine le soir ou le lendemain matin.
#   - Décision : tarif actuel < grid_charge_threshold_per_kwh
#                ET prévision solaire faible sur les prochaines heures.
#
# Si vous ne voulez PAS de charge depuis le réseau → laisser slots vide ou
# mettre grid_charge_threshold_per_kwh: 0
#
tariff:
  currency: "EUR"

  # Tarif de revente de votre surplus solaire en €/kWh.
  # 0 si vous n'êtes pas rémunéré pour l'injection réseau.
  export_price_per_kwh: 0.08

  # Seuil en €/kWh : en-dessous → charge réseau autorisée (si pas de soleil prévu).
  # Exemple : 0.15 autorise la charge en heures creuses à 0.10 €/kWh.
  # Mettre 0 pour désactiver complètement la charge depuis le réseau.
  grid_charge_threshold_per_kwh: 0.15

  # Seuil de rayonnement solaire prévu (W/m²).
  # Si la prévision dépasse ce seuil → production attendue → pas de charge réseau.
  # Valeur basse (50) = très prudent. Valeur haute (200) = autorise charge même nuageux.
  min_solar_forecast_for_grid_block: 100.0

  # Horizon en heures pour évaluer la prévision solaire avant de décider.
  # 4h = "est-ce qu'il y aura du soleil dans les 4 prochaines heures ?"
  solar_forecast_horizon_hours: 4

  # ── Créneaux tarifaires ────────────────────────────────────────────────────
  # Vous pouvez définir 1 ou plusieurs créneaux.
  # FORMAT des heures : "HH:mm"  (24h)
  # start_time et end_time : la plage [start, end[
  #   Si start > end → créneau chevauchant minuit (ex: 22:00 → 06:00)
  #   Si start == end == "00:00" → toute la journée
  # days_of_week : liste de jours (1=Lun, 2=Mar, 3=Mer, 4=Jeu, 5=Ven, 6=Sam, 7=Dim)
  #   Absent ou vide → tous les jours
  #
  # EXEMPLES DE CONFIGURATIONS :
  #
  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  EXEMPLE 1 — Tarif Bi-horaire simple (jour/nuit)                       │
  # │  Heures creuses 22h→6h à 0.10 €/kWh, heures pleines 6h→22h à 0.28    │
  # ├─────────────────────────────────────────────────────────────────────────┤
  # │  slots:                                                                  │
  # │    - name: "Heures Creuses"                                              │
  # │      price_per_kwh: 0.10                                                 │
  # │      start_time: "22:00"                                                 │
  # │      end_time:   "06:00"    # chevauchant minuit                         │
  # │                                                                           │
  # │    - name: "Heures Pleines"                                               │
  # │      price_per_kwh: 0.28                                                  │
  # │      start_time: "06:00"                                                  │
  # │      end_time:   "22:00"                                                  │
  # └─────────────────────────────────────────────────────────────────────────┘
  #
  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  EXEMPLE 2 — Tarif différencié semaine/week-end                        │
  # ├─────────────────────────────────────────────────────────────────────────┤
  # │  slots:                                                                  │
  # │    - name: "Nuit semaine"                                                │
  # │      price_per_kwh: 0.10                                                 │
  # │      start_time: "23:00"                                                 │
  # │      end_time:   "07:00"                                                 │
  # │      days_of_week: [1, 2, 3, 4, 5]   # lundi → vendredi                 │
  # │                                                                           │
  # │    - name: "Week-end"                                                     │
  # │      price_per_kwh: 0.12                                                  │
  # │      start_time: "00:00"                                                  │
  # │      end_time:   "00:00"    # toute la journée                            │
  # │      days_of_week: [6, 7]   # 6=Samedi + 7=Dimanche                           │
  # │                                                                           │
  # │    - name: "Jour semaine"                                                 │
  # │      price_per_kwh: 0.30                                                  │
  # │      start_time: "07:00"                                                  │
  # │      end_time:   "23:00"                                                  │
  # │      days_of_week: [1, 2, 3, 4, 5]                                        │
  # └─────────────────────────────────────────────────────────────────────────┘
  #
  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  EXEMPLE 3 — Tarif dynamique simple (1 seul tarif, charge réseau off)  │
  # ├─────────────────────────────────────────────────────────────────────────┤
  # │  grid_charge_threshold_per_kwh: 0                                        │
  # │  slots:                                                                  │
  # │    - name: "Tarif Standard"                                               │
  # │      price_per_kwh: 0.25                                                  │
  # │      start_time: "00:00"                                                  │
  # │      end_time:   "00:00"                                                  │
  # └─────────────────────────────────────────────────────────────────────────┘

  # ── Configuration active — adapter à votre contrat ───────────────────────
  #
  # RÈGLE IMPORTANTE : si deux slots se chevauchent à un instant donné
  # (ex: "Week-end" + "Heures Creuses" les samedi/dimanche à 23h),
  # le moteur sélectionne automatiquement le MOINS CHER et log un Warning.
  # Évitez les chevauchements pour une configuration propre.
  #
  # EXAMPLE 1 — Bi-horaire simple semaine uniquement + tarif week-end fixe :
  #
  #   slots:
  #     - name: "Heures Creuses Semaine"
  #       price_per_kwh: 0.10
  #       start_time: "22:00"
  #       end_time:   "06:00"     # chevauchant minuit
  #       days_of_week: [1,2,3,4,5]
  #
  #     - name: "Heures Pleines Semaine"
  #       price_per_kwh: 0.28
  #       start_time: "06:00"
  #       end_time:   "22:00"
  #       days_of_week: [1,2,3,4,5]
  #
  #     - name: "Week-end"
  #       price_per_kwh: 0.12     # tarif réduit toute la journée
  #       start_time: "00:00"
  #       end_time:   "00:00"     # start == end → TOUTE LA JOURNÉE
  #       days_of_week: [6,7]     # 6=Samedi, 7=Dimanche
  #
  # EXAMPLE 2 — Week-end avec nuit encore moins chère :
  #
  #   slots:
  #     - name: "Nuit Semaine"
  #       price_per_kwh: 0.10
  #       start_time: "22:00"
  #       end_time:   "06:00"
  #       days_of_week: [1,2,3,4,5]
  #
  #     - name: "Jour Semaine"
  #       price_per_kwh: 0.28
  #       start_time: "06:00"
  #       end_time:   "22:00"
  #       days_of_week: [1,2,3,4,5]
  #
  #     - name: "Nuit Week-end"
  #       price_per_kwh: 0.07     # prix très bas la nuit du week-end
  #       start_time: "22:00"
  #       end_time:   "06:00"
  #       days_of_week: [5,6,7]   # 5=vendredi, 6=samedi, 7=dimanche
  #
  #     - name: "Jour Week-end"
  #       price_per_kwh: 0.12
  #       start_time: "06:00"
  #       end_time:   "22:00"
  #       days_of_week: [6,7]
  #
  # ── Configuration active — adapter à votre contrat ───────────────────────
  #
  # days_of_week : 1=Lundi, 2=Mardi, 3=Mercredi, 4=Jeudi, 5=Vendredi, 6=Samedi, 7=Dimanche
  # Absent ou vide → le slot est actif TOUS les jours de la semaine.
  #
  # start_time == end_time == "00:00" → le slot couvre TOUTE la journée.
  # start_time > end_time             → créneau chevauchant minuit (ex: 22:00→06:00).
  #
  slots:
    # ── Semaine : heures creuses (22h→6h, lundi au vendredi) ──────────────
    - name: "HC Semaine"
      price_per_kwh: 0.10
      start_time: "22:00"
      end_time:   "06:00"       # chevauchant minuit
      days_of_week: [1,2,3,4,5] # lundi→vendredi uniquement

    # ── Semaine : heures pleines (6h→22h, lundi au vendredi) ──────────────
    - name: "HP Semaine"
      price_per_kwh: 0.28
      start_time: "06:00"
      end_time:   "22:00"
      days_of_week: [1,2,3,4,5]

    # ── Week-end : tarif réduit toute la journée ──────────────────────────
    # start_time == end_time == "00:00" → couvre les 24h du samedi et du dimanche.
    - name: "Week-end"
      price_per_kwh: 0.12
      start_time: "00:00"
      end_time:   "00:00"       # toute la journée
      days_of_week: [6,7]       # 6=Samedi, 7=Dimanche

    # ── Exemple optionnel : nuit week-end encore moins chère ──────────────
    # Décommenter pour différencier nuit/jour le week-end.
    # ATTENTION : si activé avec le slot "Week-end" ci-dessus, il y aura
    # chevauchement sur les plages 22h→6h du week-end. Choisir l'un ou l'autre.
    #
    # - name: "Nuit Week-end"
    #   price_per_kwh: 0.07
    #   start_time: "22:00"
    #   end_time:   "06:00"
    #   days_of_week: [5,6,7]   # 5=vendredi, 6=samedi, 7=dimanche
    #
    # - name: "Jour Week-end"
    #   price_per_kwh: 0.12
    #   start_time: "06:00"
    #   end_time:   "22:00"
    #   days_of_week: [6,7]

# ── Base de données MariaDB ────────────────────────────────────────────────────
database:
  connection_string: "Server=mariadb;Port=3306;Database=solar_distribution;User=solar_user;Password=solarpass;CharSet=utf8mb4;"

# ── ML.NET ─────────────────────────────────────────────────────────────────────
ml:
  model_directory: "/data/ml_models"

  # Délai avant de relire le SOC réel pour évaluer une session.
  # 4h = on attend 4h après la décision pour voir l'effet réel.
  feedback_delay_hours: 4.0

  # Fréquence de vérification des feedbacks en attente (heures).
  feedback_check_interval_hours: 1.0

  # Cron pour le ré-entraînement automatique.
  # "0 3 * * 0" = dimanche à 3h UTC (recommandé)
  retrain_cron: "0 3 * * 0"

  # Feedbacks valides minimum avant le premier entraînement.
  # ~2 jours à 1 cycle/min = 2880 sessions, avec feedback_delay=4h → 50 valides en 2j.
  min_feedback_for_retrain: 50

# ── Logging ────────────────────────────────────────────────────────────────────
logging:
  level: "Information"
  file_path: "/data/logs/solar-worker.log"
