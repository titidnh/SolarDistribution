# ═══════════════════════════════════════════════════════════════════════════════
# SolarDistribution Worker — Configuration
# Monter ce fichier dans le container : ./config/config.yaml → /config/config.yaml
# ═══════════════════════════════════════════════════════════════════════════════

# ── Home Assistant ─────────────────────────────────────────────────────────────
home_assistant:
  url: "http://192.168.1.100:8123"
  token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.VOTRE_TOKEN_ICI"
  timeout_seconds: 10
  retry_count: 3

# ── Polling ────────────────────────────────────────────────────────────────────
polling:
  interval_seconds: 60
  dry_run: true           # ← mettre false en production
  min_change_trigger_w: 10

  # ── Buffer de sécurité surplus — SEUIL DE DÉMARRAGE ──────────────────────
  #
  # Puissance (W) soustraite du surplus brut AVANT distribution aux batteries.
  # C'est aussi le SEUIL AU-DESSUS DUQUEL la charge solaire démarre.
  #
  # POURQUOI : la consommation maison fluctue en permanence. Sans buffer,
  # envoyer 100 % du surplus aux batteries provoque un import momentané depuis
  # le réseau à chaque pic de consommation (bouilloire, four, lave-linge...).
  #
  # COMMENT : surplus_effectif = surplus_brut − surplus_buffer_w
  #   Les W du buffer restent "sur le fil" pour absorber les pics.
  #
  # EXEMPLE avec 200 W de buffer :
  #   P1 = -912 W (export)  →  surplus brut = 912 W
  #   distribué batteries   = 912 - 200 = 712 W
  #   les 200 W restants couvrent les pics de consommation
  #   → pas d'import réseau entre deux cycles
  #
  # Mettre à 0 pour désactiver (tout le surplus va aux batteries).
  # Valeur recommandée : 150 à 250 W selon la variabilité de votre consommation.
  surplus_buffer_w: 200

  # ── Seuil d'arrêt de la charge solaire (anti-oscillation) ────────────────
  #
  # Puissance (W) EN DESSOUS DE LAQUELLE la charge solaire est STOPPÉE.
  #
  # POURQUOI : sans ce seuil, quand la production solaire oscille autour du
  # seuil de démarrage (surplus_buffer_w), la charge s'active et se coupe
  # toutes les 5 minutes — ce qui génère des dizaines de ON/OFF inutiles sur
  # le self-powered EcoFlow ou tout switch de charge.
  #
  # LOGIQUE double-seuil (hystérésis) :
  #   · Démarrage : surplus > surplus_buffer_w       (ex: 200 W)
  #   · Arrêt     : surplus < surplus_stop_buffer_w  (ex: 80 W)
  #   · Zone [80W–200W] : on MAINTIENT l'état précédent (ni démarrage, ni arrêt)
  #
  # EXEMPLE — matin nuageux, surplus fluctuant entre 50 W et 250 W :
  #   Sans hystérésis : ON / OFF / ON / OFF toutes les 5 min
  #   Avec hystérésis : ON dès 201W, reste ON jusqu'à < 80W → stabilité totale
  #
  # Doit être strictement inférieur à surplus_buffer_w.
  # Valeur recommandée : 30 à 100 W (≈ 40% du surplus_buffer_w).
  # Mettre à 0 pour désactiver (comportement original sans hystérésis).
  surplus_stop_buffer_w: 80

  # ── Durée minimale de charge avant autorisation d'arrêt ──────────────────
  #
  # Nombre de cycles consécutifs en charge MINIMUM avant qu'un arrêt soit autorisé.
  #
  # POURQUOI : un passage nuageux de 5 minutes peut faire chuter le surplus
  # sous surplus_stop_buffer_w. Sans ce garde-fou, la charge s'arrête, le
  # self-powered s'active, puis le soleil revient et ça redémarre — inutile.
  #
  # CALCUL : min_charge_duration_cycles × interval_seconds = durée minimale
  #   Exemple : 3 cycles × 60 s  = 3 minutes minimum de charge avant tout arrêt
  #   Exemple : 3 cycles × 300 s = 15 minutes minimum
  #
  # Valeur recommandée : 3 (bon compromis réactivité / stabilité).
  # Mettre à 0 pour désactiver.
  min_charge_duration_cycles: 3

# ── Météo Open-Meteo ────────────────────────────────────────────────────────────
#
# Les données météo (radiation solaire, nuages, prévisions 12h) sont rafraîchies
# indépendamment du cycle de distribution (polling.interval_seconds).
# Open-Meteo met à jour ses modèles ~toutes les heures → inutile de rafraîchir
# plus souvent que toutes les 15 minutes.
#
# Valeurs recommandées :
#   15  → bon compromis précision / appels API (défaut)
#   30  → suffisant pour la plupart des installations
#   60  → si vous voulez minimiser les appels réseau
#
weather:
  refresh_interval_minutes: 15

# ── Localisation (pour météo Open-Meteo) ──────────────────────────────────────
location:
  latitude:  50.85    # Bruxelles — adapter à votre emplacement
  longitude:  4.35

# ── Production solaire ─────────────────────────────────────────────────────────
#
# surplus_mode : comment lire le surplus disponible pour charger les batteries.
#
#   direct    (défaut) : l'entité expose directement le surplus en W (>= 0).
#                        ex: un sensor dédié de votre onduleur ou template HA.
#
#   p1_invert          : l'entité est la puissance réseau de votre compteur P1/DSMR.
#                        La valeur est NÉGATIVE quand vous exportez (surplus disponible)
#                        et POSITIVE quand vous importez depuis le réseau.
#                        Le Worker inverse automatiquement le signe.
#
#                        Exemple avec compteur P1 (Linky, DSMR, P1 Dongle...) :
#                          sensor.p1_power = -1360 W  =>  surplus = 1360 W
#                          sensor.p1_power =  +800 W  =>  surplus = 0 W (import)
#
#   +---------------------------------------------------------------------------+
#   |  Entités HA selon votre installation                                      |
#   |                                                                           |
#   |  Compteur P1 / DSMR (mode p1_invert) :                                  |
#   |    P1 Dongle, ISKRA, Sagemcom, Linky via Enedis...                       |
#   |    Dans HA chercher : "Puissance" / "Power" / "Active power"             |
#   |    La valeur négative = export = surplus => parfait pour p1_invert       |
#   |                                                                           |
#   |  Onduleur solaire avec sensor dédié (mode direct) :                      |
#   |    Fronius, SMA, SolarEdge, SolaX, GivEnergy...                         |
#   |    Chercher : "Export power" / "Grid feed-in" / "Surplus"               |
#   +---------------------------------------------------------------------------+
#
solar:
  # Mode p1_invert : utilise la puissance réseau du compteur P1.
  # Remplacer par "direct" si vous avez un sensor de surplus dédié.
  surplus_mode: "p1_invert"

  # Entité HA de la puissance réseau (compteur P1).
  # Trouver le bon entity_id : HA -> Outils de développement -> États -> chercher "Puissance"
  # Exemples selon intégration :
  #   P1 Dongle (DSMR)      : sensor.p1_power
  #   Shelly EM             : sensor.shelly_em_channel_1_power
  #   Fronius Smart Meter   : sensor.fronius_grid_power
  #   Intégration générique : sensor.power_phase_1
  surplus_entity: "sensor.YOUR_P1_POWER_ENTITY"

  # Entité de production PV brute (optionnel — pour le logging et le ML).
  # ex: sensor.onduleur_puissance_active, sensor.solar_active_power
  production_entity: "sensor.YOUR_PV_ACTIVE_POWER_ENTITY"

  # Entité de consommation maison (optionnel).
  # Pas nécessaire en mode p1_invert : la consommation est implicite dans P1.
  # consumption_entity: "sensor.home_consumption_power"

  # ┌────────────────────────────────────────────────────────────────────────────┐
  # │  PRÉVISION DE CHARGE (LOAD FORECASTING) — OPTIONNEL                       │
  # ├────────────────────────────────────────────────────────────────────────────┤
  # │  PROBLÈME SANS CES RÉGLAGES :                                              │
  # │    À 14h, le worker voit 300W de surplus et estime que le solaire          │
  # │    couvrira les batteries jusqu'à 18h. Sauf que le four s'allume à 17h     │
  # │    et absorbe 2000W → plus rien pour les batteries → import réseau en HP.  │
  # │                                                                            │
  # │  SOLUTION :                                                                │
  # │    Le worker projette la consommation maison sur les prochaines heures     │
  # │    (rolling average des N derniers cycles × horizon).                      │
  # │    Si la conso estimée dépasse le solaire attendu → la charge réseau       │
  # │    est augmentée en conséquence (ComputeAdaptiveGridChargeW).              │
  # │                                                                            │
  # │  DEUX MODES DE CONFIGURATION :                                             │
  # │                                                                            │
  # │    1. consumption_entity (une seule entité globale) :                      │
  # │         → décommenter ci-dessus                                            │
  # │         → ex: sensor.home_consumption_power                                │
  # │                                                                            │
  # │    2. zone_consumption_entities (somme de plusieurs appareils) :           │
  # │         → utile si vous n'avez pas de sensor de conso globale              │
  # │         → les valeurs sont sommées pour estimer la conso totale            │
  # │         → ignoré si consumption_entity est déjà configuré                 │
  # └────────────────────────────────────────────────────────────────────────────┘

  # Entités HA de consommation par zone/appareil (W) — décommenter et adapter.
  # Somme automatique si consumption_entity est absent.
  # zone_consumption_entities:
  #   - "sensor.ev_charger_power"        # Chargeur voiture électrique
  #   - "sensor.water_heater_power"      # Chauffe-eau
  #   - "sensor.oven_power"              # Four

  # Nombre de cycles récents utilisés pour la moyenne roulante de consommation.
  # 12 cycles × 60s = 10 min de rolling average (recommandé)
  # Mettre à 0 pour désactiver (utilise uniquement la lecture live).
  consumption_rolling_window_cycles: 12

  # Horizon de projection de la consommation estimée (en heures).
  # EstimatedConsumptionNextHoursWh = avg_consumption_W × horizon
  # Aligner avec tariff.solar_forecast_horizon_hours (défaut 4h).
  consumption_projection_hours: 4.0

  # ┌────────────────────────────────────────────────────────────────────────────┐
  # │  PRÉVISIONS SOLAIRES HA — OPTIONNEL MAIS FORTEMENT RECOMMANDÉ             │
  # ├────────────────────────────────────────────────────────────────────────────┤
  # │  Ces deux entités exposent la production estimée (en Wh) pour AUJOURD'HUI │
  # │  et DEMAIN, calculée par votre intégration Solcast ou Forecast.solar.      │
  # │                                                                            │
  # │  POURQUOI C'EST PRÉCIEUX :                                                 │
  # │    Open-Meteo donne le rayonnement générique W/m² pour votre localisation. │
  # │    Solcast/Forecast.solar connaît VOTRE installation :                     │
  # │      → orientation & inclinaison de vos panneaux                          │
  # │      → surface installée                                                   │
  # │      → masques et ombrages spécifiques                                    │
  # │      → rendement réel de vos modules                                      │
  # │    Résultat : 30 à 50% plus précis que le calcul générique.               │
  # │                                                                            │
  # │  CE QUE CA AMÉLIORE :                                                      │
  # │    • Décision de charge réseau : si aujourd'hui prévision > capacité       │
  # │      batterie → pas besoin de charger depuis le réseau cette nuit          │
  # │    • Calcul adaptatif (ComputeAdaptiveGridChargeW) : l'énergie solaire     │
  # │      attendue est déduite avec précision → puissance réseau exacte        │
  # │    • ML features directes (ML-8) : le modèle apprend sur vos vraies       │
  # │      données de production → SoftMax et seuil préventif optimisés         │
  # │      pour VOTRE installation spécifiquement                               │
  # │    • FeedbackEvaluator : labels d'entraînement enrichis selon le          │
  # │      résultat réel vs prévision HA                                         │
  # │                                                                            │
  # │  INTÉGRATIONS COMPATIBLES :                                                │
  # │    Solcast :        sensor.solcast_pv_forecast_forecast_today              │
  # │                     sensor.solcast_pv_forecast_forecast_tomorrow           │
  # │    Forecast.solar : sensor.energy_production_today                         │
  # │                     sensor.energy_production_tomorrow                      │
  # │    SolarEdge :      sensor.solaredge_estimated_power_today                 │
  # │    Onduleur HA :    Chercher "Production estimée" dans Outils → États      │
  # └────────────────────────────────────────────────────────────────────────────┘

  # Production solaire estimée AUJOURD'HUI (Wh) — décommenter et adapter
  # forecast_today_entity: "sensor.solcast_pv_forecast_forecast_today"

  # Production solaire estimée DEMAIN (Wh) — décommenter et adapter
  # forecast_tomorrow_entity: "sensor.solcast_pv_forecast_forecast_tomorrow"

  # ┌────────────────────────────────────────────────────────────────────────────┐
  # │  PRÉVISIONS SOLCAST INTRA-JOURNALIÈRES — OPTIONNEL                        │
  # ├────────────────────────────────────────────────────────────────────────────┤
  # │  PROBLÈME SANS CES RÉGLAGES :                                              │
  # │    L'algo connaît la production totale J (ex: 8000 Wh) mais pas QUAND.    │
  # │    À 2h du matin, il ne sait pas si le soleil arrive dans 4h ou 8h.       │
  # │    Il applique un profil sinusoïdal générique (pic à midi) et peut         │
  # │    charger 600W depuis le réseau alors que 1000Wh arrivent dès 9h.        │
  # │                                                                            │
  # │  SOLUTION (3 entités Solcast) :                                            │
  # │    • forecast_this_hour  : production de l'heure courante (Wh)            │
  # │    • forecast_next_hour  : production de l'heure suivante (Wh)            │
  # │    • forecast_remaining_today : solaire restant aujourd'hui (Wh)           │
  # │                                                                            │
  # │  CE QUE ÇA AMÉLIORE :                                                      │
  # │    • Si next_hour élevé → réduction proportionnelle de la charge réseau    │
  # │      (on attend le solaire plutôt que de charger du réseau inutilement)    │
  # │    • Bilan journalier précis : capacity × (softMax − SOC) − remaining     │
  # │      → bloque la charge réseau si le solaire restant couvre le déficit     │
  # │    • Courbe horaire réelle remplace le profil sinusoïdal simplifié         │
  # │                                                                            │
  # │  ENTITÉS SOLCAST STANDARD (intégration Home Assistant) :                  │
  # │    sensor.solcast_pv_forecast_forecast_this_hour                           │
  # │    sensor.solcast_pv_forecast_forecast_next_hour                           │
  # │    sensor.solcast_pv_forecast_forecast_remaining_today                     │
  # └────────────────────────────────────────────────────────────────────────────┘

  # Production Solcast CETTE HEURE (Wh) — décommenter et adapter
  # forecast_this_hour_entity: "sensor.solcast_pv_forecast_forecast_this_hour"

  # Production Solcast HEURE SUIVANTE (Wh) — décommenter et adapter
  # forecast_next_hour_entity: "sensor.solcast_pv_forecast_forecast_next_hour"

  # Production Solcast RESTANTE AUJOURD'HUI (Wh) — décommenter et adapter
  # Requis pour le bilan énergétique journalier (Feature 4).
  # forecast_remaining_today_entity: "sensor.solcast_pv_forecast_forecast_remaining_today"

# ── Batteries ──────────────────────────────────────────────────────────────────
batteries:

  - id: 1
    name: "Batterie Principale"
    priority: 1
    capacity_wh: 10000

    # Puissance max de recharge en W — valeur STATIQUE de sécurité.
    # Utilisée si max_charge_rate_entity n'est pas configurée ou si la lecture échoue.
    max_charge_rate_w: 3000

    min_percent: 20       # En-dessous = URGENT (priorité 0)
    soft_max_percent: 80  # Cible normale (ajustée dynamiquement par ML)
    hard_max_percent: 100 # Plafond absolu

    # Puissance de maintien (W) envoyée quand la batterie a atteint sa cible.
    # Au lieu d'envoyer 0 W — ce qui peut provoquer un cycling on/off du BMS —
    # on maintient cette consigne symbolique pour garder le BMS en mode charge.
    # Absorbe aussi les micro-surplus résiduels (bruit du compteur P1).
    # Défaut : 100 W. Mettre à 0 pour comportement standard (coupe à la cible).
    idle_charge_w: 100

    # ── Puissance minimale hardware (seuil physique de la batterie) ───────────
    # En dessous de cette valeur, la batterie ignore silencieusement la consigne.
    # Exemple EcoFlow Delta 3 : 100W minimum.
    # Impact :
    #   · Surplus solaire < hardware_min_charge_w → pas de charge (PASS 1/2 skippé)
    #   · IdleCharge : même garde (surplus doit couvrir ce seuil physique)
    #   · Emergency grid charge : ignore ce seuil, charge toujours
    # Mettre à 0 pour désactiver (aucun seuil minimum).
    hardware_min_charge_w: 100

    # ── Anti-oscillation IdleCharge ───────────────────────────────────────────
    # Zone morte autour du seuil d'activation IdleChargeW.
    #
    # Problème sans hystérésis : surplus oscille entre 90W et 110W autour de
    # idle_charge_w=100W → ON/OFF à chaque cycle → ZeroWActions / NonZeroWActions
    # déclenchées en boucle → stress BMS EcoFlow sur self-powered toggle.
    #
    # Solution double-seuil :
    #   · Activation  : surplus >= idle_charge_w              (100W)
    #   · Arrêt       : surplus <  idle_charge_w - idle_stop_buffer_w  (70W)
    #   · Zone morte  : [70W – 100W] → état précédent maintenu
    #
    # Valeur recommandée : 30W. Mettre à 0 pour désactiver (seuil unique, risque ON/OFF).
    idle_stop_buffer_w: 30

    # ── Zone morte SOC autour de la cible (anti micro-charges BMS) ───────────
    #
    # POURQUOI : une fois la cible atteinte (ex: 80%), certains systèmes comme
    # l'EcoFlow en self-powered continuent de se décharger légèrement (~1-2%/h).
    # Sans hystérésis, au cycle suivant SOC = 79.9% → énergie résiduelle = 1 Wh
    # → puissance cible = 0.2 W → clampée à idle_charge_w (100 W) → mais l'espace
    # physique restant (1 Wh) gagne le Math.Min → commande finale = 1 W.
    # Résultat : 50+ micro-commandes par nuit, ignorées par le BMS mais enregistrées
    # comme cycles de charge → usure prématurée.
    #
    # AVEC soc_hysteresis_percent = 2 :
    #   · Seuil de rechargement = soft_max_percent - 2%  (ex: 80% - 2% = 78%)
    #   · Entre 78% et 80% : aucune charge réseau (zone morte, auto-décharge acceptée)
    #   · SOC descend à 77.9% → recharge réseau normale ≥ idle_charge_w (efficace)
    #
    # La batterie oscille donc entre 78% et 80% au lieu de générer des micro-commandes.
    # Valeur recommandée : 2.0 (%). Mettre à 0 pour désactiver (comportement original).
    soc_hysteresis_percent: 2.0

    entities:
      soc: "sensor.battery_main_state_of_charge"
      charge_power: "number.battery_main_charge_power"

      # ── Puissance de charge réelle actuelle (OPTIONNEL — FORTEMENT RECOMMANDÉ) ──
      #
      # Entité HA exposant la puissance mesurée actuellement par la batterie (W).
      #
      # POURQUOI C'EST IMPORTANT :
      #   Le surplus HA (P1 ou sensor) est déjà NET de ce que les batteries
      #   consomment en ce moment. Sans cette entité, le Worker sous-estime
      #   le surplus réel disponible.
      #
      #   Exemple : batteries chargent à 200W + 200W = 400W, P1 = -912W
      #     Sans correction → order 912W  → gain réel = 912W (correct apparent)
      #     MAIS les batteries recevront  → 912W au lieu de 1312W théoriques
      #     Avec correction → surplus_réel = 912 + 400 = 1312W → order 1312W ✓
      #
      # EXEMPLES D'ENTITÉS selon matériel :
      #   EcoFlow Delta via MQTT : sensor.delta3_bureau_ac_charge_power_w
      #   Victron MPPT            : sensor.victron_battery_charge_power
      #   Solis / SolarEdge       : sensor.inverter_battery_charge_power
      #   Générique               : Chercher "charge power" dans HA → États
      #
      # current_charge_power_entity: "sensor.battery_main_charge_power_w"
      # current_charge_power_multiplier: 1.0   # -1.0 si la valeur est négative en charge

      # OPTIONNEL — puissance max de recharge lue dynamiquement depuis HA.
      # Écrase max_charge_rate_w si disponible. Utile si le BMS ajuste la limite
      # selon la température ou l'état de santé.
      # max_charge_rate_entity: "sensor.battery_main_max_charge_power_w"
      max_rate_read_multiplier: 1.0   # 48.0 si l'entité expose des Ampères sur 48V

      # OPTIONNEL — switch pour activer/désactiver la recharge
      # charge_switch: "switch.battery_main_charge_enable"

      # Multiplicateur si HA attend des Ampères plutôt que des Watts
      # Exemple batterie 48V : value_multiplier: 0.02083  (W / 48 = A)
      value_multiplier: 1.0
      value_unit: "W"

      # ── Actions conditionnelles (OPTIONNEL) ─────────────────────────────────
      #
      # zero_w_actions   : liste d'actions HA exécutées quand AllocatedW == 0
      #                     (aucun surplus → batterie ne charge pas)
      # non_zero_w_actions: liste d'actions HA exécutées quand AllocatedW > 0
      #                     (surplus disponible → batterie charge)
      #
      # Chaque action a les champs suivants :
      #
      #   type      (obligatoire) :
      #     "turn_on"  → homeassistant/turn_on  { entity_id }
      #     "turn_off" → homeassistant/turn_off { entity_id }
      #     "service"  → appel libre avec domain + service + data (JSON)
      #
      #   entity_id (pour turn_on / turn_off) : entité HA ciblée
      #   domain    (pour service) : domaine HA, ex: "input_boolean", "script"
      #   service   (pour service) : service HA, ex: "turn_on", "trigger"
      #   data      (pour service) : payload JSON libre, ex: { entity_id: "..." }
      #   label     (optionnel)    : nom affiché dans les logs
      #
      # ┌─────────────────────────────────────────────────────────────────────┐
      # │  EXEMPLE EcoFlow Delta 3 — self-powered mode                       │
      # │                                                                     │
      # │  Quand 0W : activer self-powered → EcoFlow alimente la maison      │
      # │  Quand > 0W : désactiver self-powered → onduleur solaire recharge  │
      # └─────────────────────────────────────────────────────────────────────┘
      #
      # zero_w_actions:
      #   - type: turn_on
      #     entity_id: "switch.delta3_salon_self_powered_mode"
      #     label: "EcoFlow self-powered ON"
      #
      # non_zero_w_actions:
      #   - type: turn_off
      #     entity_id: "switch.delta3_salon_self_powered_mode"
      #     label: "EcoFlow self-powered OFF"
      #
      # ┌─────────────────────────────────────────────────────────────────────┐
      # │  EXEMPLE avancé — script HA + notification                         │
      # └─────────────────────────────────────────────────────────────────────┘
      #
      # zero_w_actions:
      #   - type: turn_on
      #     entity_id: "switch.delta3_salon_self_powered_mode"
      #     label: "EcoFlow self-powered ON"
      #   - type: service
      #     domain: "notify"
      #     service: "mobile_app_mon_telephone"
      #     data:
      #       message: "EcoFlow en mode self-powered (0W solaire)"
      #     label: "Notification self-powered"
      #
      # non_zero_w_actions:
      #   - type: turn_off
      #     entity_id: "switch.delta3_salon_self_powered_mode"
      #     label: "EcoFlow self-powered OFF"
      #   - type: service
      #     domain: "script"
      #     service: "turn_on"
      #     data:
      #       entity_id: "script.ecoflow_charge_mode_actif"
      #     label: "Script charge active"

  - id: 2
    name: "Batterie Secondaire"
    priority: 2
    capacity_wh: 5000
    max_charge_rate_w: 2000
    min_percent: 20
    soft_max_percent: 80
    hard_max_percent: 100
    idle_charge_w: 100
    hardware_min_charge_w: 100  # Seuil physique hardware — voir batterie 1 pour la doc complète
    idle_stop_buffer_w: 30      # Zone morte IdleCharge — voir batterie 1 pour la doc complète
    soc_hysteresis_percent: 2.0 # Zone morte SOC — voir batterie 1 pour la doc complète

    entities:
      soc: "sensor.battery_secondary_state_of_charge"
      charge_power: "number.battery_secondary_charge_power"
      max_rate_read_multiplier: 1.0
      value_multiplier: 1.0
      value_unit: "W"
      # current_charge_power_entity: "sensor.battery_secondary_charge_power_w"
      # current_charge_power_multiplier: 1.0

      # ── Recharge réseau d'urgence (OPTIONNEL) ──────────────────────────────
      #
      # emergency_grid_charge_below_percent : si SOC descend SOUS ce seuil,
      #   la batterie est rechargée depuis le réseau même hors heure creuse,
      #   SAUF si le soleil est attendu (solar_forecast_horizon_hours).
      #
      # emergency_grid_charge_target_percent : jusqu'à quel % recharger en urgence.
      #   null ou absent → utilise soft_max_percent comme cible.
      #   Recommandé : valeur modeste (ex: 50%) pour garder de la place pour le solaire.
      #
      # Comportement :
      #   SOC < below_percent ET pas de soleil prévu
      #     → charge réseau forcée jusqu'à target_percent
      #     → NonZeroWActions déclenchées (ex: désactivation self-powered EcoFlow)
      #   SOC < below_percent MAIS soleil attendu
      #     → pas de charge réseau (l'autoconsommation va couvrir)
      #     → log informatif uniquement
      #
      # emergency_grid_charge_below_percent: 20
      # emergency_grid_charge_target_percent: 50

      # Exemple EcoFlow Delta 3 — self-powered mode
      # Décommenter et adapter les entity_id selon votre installation.
      #
      # zero_w_actions:
      #   - type: turn_on
      #     entity_id: "switch.delta3_salon_self_powered_mode"
      #     label: "EcoFlow Delta 3 self-powered ON (0W surplus)"
      #
      # non_zero_w_actions:
      #   - type: turn_off
      #     entity_id: "switch.delta3_salon_self_powered_mode"
      #     label: "EcoFlow Delta 3 self-powered OFF (surplus disponible)"

# ── Tarification électrique ────────────────────────────────────────────────────
#
# OBJECTIF : maximiser l'autoconsommation.
#   - Pendant la production solaire → charge DEPUIS le surplus, jamais depuis le réseau.
#   - Hors production + tarif bas → charge DEPUIS le réseau pour éviter d'acheter
#     en heure pleine le soir ou le lendemain matin.
#   - Décision : tarif actuel < grid_charge_threshold_per_kwh
#                ET prévision solaire faible sur les prochaines heures.
#
# Si vous ne voulez PAS de charge depuis le réseau → laisser slots vide ou
# mettre grid_charge_threshold_per_kwh: 0
#
tariff:
  currency: "EUR"

  # Tarif de revente de votre surplus solaire en €/kWh.
  # 0 si vous n'êtes pas rémunéré pour l'injection réseau.
  export_price_per_kwh: 0.08

  # ┌────────────────────────────────────────────────────────────────────────────┐
  # │  TARIF DYNAMIQUE SPOT (OPTIONNEL) — Tibber, Eneco Variable, Belpower...   │
  # ├────────────────────────────────────────────────────────────────────────────┤
  # │  PROBLÈME SANS CES RÉGLAGES :                                              │
  # │    Les créneaux HC/HP sont codés en dur en YAML. Si vous avez un contrat  │
  # │    à prix variable (Tibber, Eneco variable, Belpower SPOT...), le Worker  │
  # │    ignore le prix réel et charge au mauvais moment.                       │
  # │                                                                            │
  # │  SOLUTION :                                                                │
  # │    current_price_entity expose le prix live en €/kWh depuis HA.           │
  # │    Quand configuré, le Worker remplace la lecture des créneaux YAML        │
  # │    par le prix HA en temps réel.                                           │
  # │                                                                            │
  # │  SEUIL DYNAMIQUE :                                                         │
  # │    Le seuil grid_charge_threshold_per_kwh devient la base fixe,           │
  # │    MAIS si dynamic_threshold_factor est configuré, le seuil effectif      │
  # │    est recalculé automatiquement = moyenne_24h_des_prix × factor.         │
  # │    Ex : moyenne 24h = 0.20 €/kWh, factor = 0.80                           │
  # │      → seuil = 0.16 €/kWh (charge quand 20% sous la moyenne)              │
  # │                                                                            │
  # │  ENTITÉS HA COMPATIBLES :                                                  │
  # │    Tibber          : sensor.tibber_price_current_total                     │
  # │    Eneco variable  : sensor.eneco_current_price                            │
  # │    EPEX / EDF TOU  : sensor.epex_spot_price                                │
  # │    Octopus Energy  : sensor.octopus_electricity_current_rate               │
  # │    Générique       : Chercher "price" / "tariff" / "rate" dans HA → États  │
  # │                                                                            │
  # │  FALLBACK :                                                                │
  # │    Si la lecture HA échoue → retour automatique aux créneaux YAML.        │
  # │    Les slots ci-dessous restent donc utiles comme filet de sécurité.      │
  # └────────────────────────────────────────────────────────────────────────────┘

  # Entité HA exposant le prix spot courant (€/kWh) — décommenter et adapter.
  # current_price_entity: "sensor.tibber_price_current_total"

  # Facteur multiplicateur pour le seuil dynamique (rolling 24h × factor).
  # 0.8 = charge quand le prix est 20% sous la moyenne journalière (recommandé).
  # 1.0 = charge dès que le prix est sous la moyenne.
  # Ignoré si current_price_entity est absent.
  # dynamic_threshold_factor: 0.8

  # Seuil en €/kWh : en-dessous → charge réseau autorisée (si pas de soleil prévu).
  # En mode dynamique, ce seuil sert de FALLBACK si le rolling 24h a < 3 points.
  # Exemple : 0.15 autorise la charge en heures creuses à 0.10 €/kWh.
  # Mettre 0 pour désactiver complètement la charge depuis le réseau.
  grid_charge_threshold_per_kwh: 0.15

  # Seuil de rayonnement solaire prévu (W/m²).
  # Si la prévision dépasse ce seuil → production attendue → pas de charge réseau.
  # Valeur basse (50) = très prudent. Valeur haute (200) = autorise charge même nuageux.
  min_solar_forecast_for_grid_block: 100.0

  # ── Seuil HA Forecast pour blocage charge réseau ──────────────────────────
  # Si ForecastTodayWh >= cette valeur → le solaire couvrira la demande → pas
  # de charge réseau même si Open-Meteo ne prédit rien (signal plus précis).
  # Ajuster selon votre puissance crête installée :
  #   Installation ~2 kWc → 400-600 Wh
  #   Installation ~4 kWc → 800-1200 Wh
  #   Installation ~6 kWc → 1500-2000 Wh
  # Ignoré si forecast_today_entity n'est pas configuré.
  min_ha_forecast_wh_for_grid_block: 500.0

  # ── Boost SoftMax quand demain est mauvais ────────────────────────────────
  # Si ForecastTomorrow < low_forecast_tomorrow_wh ET qu'on est dans un créneau
  # tarifaire favorable (HC, week-end...) → SoftMax augmenté de evening_boost_percent.
  # Objectif : maximiser la réserve des batteries PENDANT les heures bon marché
  # avant une journée peu ensoleillée (fonctionne à toute heure, pas seulement le soir).
  #
  # Exemples :
  #   Demain prévu 600 Wh (mauvais) + on est en HC à 2h du matin
  #     → SoftMax 80% + 10% = 90% jusqu'à la fin du créneau
  #   Demain prévu 600 Wh + on est en HP (tarif cher)
  #     → Pas de boost (on ne charge pas depuis le réseau de toute façon)
  #
  # low_forecast_tomorrow_wh : seuil Wh en dessous duquel "demain est mauvais"
  #   Ajuster selon votre installation (même ordre de grandeur que min_ha_forecast_wh_for_grid_block)
  low_forecast_tomorrow_wh: 1000.0

  # evening_boost_percent : bonus SoftMax en points de %
  #   Plafonné à hard_max_percent de chaque batterie.
  #   Défaut 10% → SoftMax 80% devient 90% pendant le créneau favorable.
  evening_boost_percent: 10.0

  # ── Lazy Charging ──────────────────────────────────────────────────────────
  # Marge de sécurité (heures) pour décaler la charge réseau HC vers la fin du slot.
  #
  # Principe : plutôt que de charger dès l'ouverture du slot HC à faible puissance,
  # le worker attend et ne démarre qu'à l'heure limite :
  #   heure de démarrage = fin_du_slot - hoursNeeded - lazy_buffer_hours
  #
  # Exemple : slot HC 22h→7h (9h), batterie à 78% (besoin ~0.07h à 1000W), buffer=0.5h
  #   → charge démarrée vers 06h25 au lieu de 22h00
  #   → les batteries restent en self-powered toute la nuit (consommation locale)
  #
  # Log attendu pendant l'attente :
  #   ⏳ Lazy charge — Battery 1: SOC 78.4% (target 85%), waiting for end of [HC Nuit] slot (8.4h remaining)
  #
  # Valeur recommandée : 0.5 (30 min de marge).
  # Augmenter si le SOC dérive ou si les batteries arrivent souvent à vide en fin de nuit.
  # Mettre à 0 pour désactiver (comportement original : charge immédiate en début de slot HC).
  lazy_buffer_hours: 0.5

  # Horizon en heures pour évaluer la prévision solaire avant de décider.
  # 4h = "est-ce qu'il y aura du soleil dans les 4 prochaines heures ?"
  solar_forecast_horizon_hours: 4

  # ── Créneaux tarifaires ────────────────────────────────────────────────────
  # Vous pouvez définir 1 ou plusieurs créneaux.
  # FORMAT des heures : "HH:mm"  (24h)
  # start_time et end_time : la plage [start, end[
  #   Si start > end → créneau chevauchant minuit (ex: 22:00 → 06:00)
  #   Si start == end == "00:00" → toute la journée
  # days_of_week : liste de jours (1=Lun, 2=Mar, 3=Mer, 4=Jeu, 5=Ven, 6=Sam, 7=Dim)
  #   Absent ou vide → tous les jours
  #
  # EXEMPLES DE CONFIGURATIONS :
  #
  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  EXEMPLE 1 — Tarif Bi-horaire simple (jour/nuit)                       │
  # │  Heures creuses 22h→6h à 0.10 €/kWh, heures pleines 6h→22h à 0.28    │
  # ├─────────────────────────────────────────────────────────────────────────┤
  # │  slots:                                                                  │
  # │    - name: "Heures Creuses"                                              │
  # │      price_per_kwh: 0.10                                                 │
  # │      start_time: "22:00"                                                 │
  # │      end_time:   "06:00"    # chevauchant minuit                         │
  # │                                                                           │
  # │    - name: "Heures Pleines"                                               │
  # │      price_per_kwh: 0.28                                                  │
  # │      start_time: "06:00"                                                  │
  # │      end_time:   "22:00"                                                  │
  # └─────────────────────────────────────────────────────────────────────────┘
  #
  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  EXEMPLE 2 — Tarif différencié semaine/week-end                        │
  # ├─────────────────────────────────────────────────────────────────────────┤
  # │  slots:                                                                  │
  # │    - name: "Nuit semaine"                                                │
  # │      price_per_kwh: 0.10                                                 │
  # │      start_time: "23:00"                                                 │
  # │      end_time:   "07:00"                                                 │
  # │      days_of_week: [1, 2, 3, 4, 5]   # lundi → vendredi                 │
  # │                                                                           │
  # │    - name: "Week-end"                                                     │
  # │      price_per_kwh: 0.12                                                  │
  # │      start_time: "00:00"                                                  │
  # │      end_time:   "00:00"    # toute la journée                            │
  # │      days_of_week: [6, 7]   # 6=Samedi + 7=Dimanche                      │
  # │                                                                           │
  # │    - name: "Jour semaine"                                                 │
  # │      price_per_kwh: 0.30                                                  │
  # │      start_time: "07:00"                                                  │
  # │      end_time:   "23:00"                                                  │
  # │      days_of_week: [1, 2, 3, 4, 5]                                        │
  # └─────────────────────────────────────────────────────────────────────────┘
  #
  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  EXEMPLE 3 — Tarif dynamique simple (1 seul tarif, charge réseau off)  │
  # ├─────────────────────────────────────────────────────────────────────────┤
  # │  grid_charge_threshold_per_kwh: 0                                        │
  # │  slots:                                                                  │
  # │    - name: "Tarif Standard"                                               │
  # │      price_per_kwh: 0.25                                                  │
  # │      start_time: "00:00"                                                  │
  # │      end_time:   "00:00"                                                  │
  # └─────────────────────────────────────────────────────────────────────────┘

  # ── Configuration active — adapter à votre contrat ───────────────────────
  #
  # RÈGLE IMPORTANTE : si deux slots se chevauchent à un instant donné
  # (ex: "Week-end" + "Heures Creuses" les samedi/dimanche à 23h),
  # le moteur sélectionne automatiquement le MOINS CHER et log un Warning.
  # Évitez les chevauchements pour une configuration propre.
  #
  # EXAMPLE 1 — Bi-horaire simple semaine uniquement + tarif week-end fixe :
  #
  #   slots:
  #     - name: "Heures Creuses Semaine"
  #       price_per_kwh: 0.10
  #       start_time: "22:00"
  #       end_time:   "06:00"     # chevauchant minuit
  #       days_of_week: [1,2,3,4,5]
  #
  #     - name: "Heures Pleines Semaine"
  #       price_per_kwh: 0.28
  #       start_time: "06:00"
  #       end_time:   "22:00"
  #       days_of_week: [1,2,3,4,5]
  #
  #     - name: "Week-end"
  #       price_per_kwh: 0.12     # tarif réduit toute la journée
  #       start_time: "00:00"
  #       end_time:   "00:00"     # start == end → TOUTE LA JOURNÉE
  #       days_of_week: [6,7]     # 6=Samedi, 7=Dimanche
  #
  # EXAMPLE 2 — Week-end avec nuit encore moins chère :
  #
  #   slots:
  #     - name: "Nuit Semaine"
  #       price_per_kwh: 0.10
  #       start_time: "22:00"
  #       end_time:   "06:00"
  #       days_of_week: [1,2,3,4,5]
  #
  #     - name: "Jour Semaine"
  #       price_per_kwh: 0.28
  #       start_time: "06:00"
  #       end_time:   "22:00"
  #       days_of_week: [1,2,3,4,5]
  #
  #     - name: "Nuit Week-end"
  #       price_per_kwh: 0.07     # prix très bas la nuit du week-end
  #       start_time: "22:00"
  #       end_time:   "06:00"
  #       days_of_week: [5,6,7]   # 5=vendredi, 6=samedi, 7=dimanche
  #
  #     - name: "Jour Week-end"
  #       price_per_kwh: 0.12
  #       start_time: "06:00"
  #       end_time:   "22:00"
  #       days_of_week: [6,7]
  #
  # ── Configuration active — adapter à votre contrat ───────────────────────
  #
  # days_of_week : 1=Lundi, 2=Mardi, 3=Mercredi, 4=Jeudi, 5=Vendredi, 6=Samedi, 7=Dimanche
  # Absent ou vide → le slot est actif TOUS les jours de la semaine.
  #
  # start_time == end_time == "00:00" → le slot couvre TOUTE la journée.
  # start_time > end_time             → créneau chevauchant minuit (ex: 22:00→06:00).
  #
  slots:
    # ── Semaine : heures creuses (22h→6h, lundi au vendredi) ──────────────
    - name: "HC Semaine"
      price_per_kwh: 0.10
      start_time: "22:00"
      end_time:   "06:00"       # chevauchant minuit
      days_of_week: [1,2,3,4,5] # lundi→vendredi uniquement

    # ── Semaine : heures pleines (6h→22h, lundi au vendredi) ──────────────
    - name: "HP Semaine"
      price_per_kwh: 0.28
      start_time: "06:00"
      end_time:   "22:00"
      days_of_week: [1,2,3,4,5]

    # ── Week-end : tarif réduit toute la journée ──────────────────────────
    # start_time == end_time == "00:00" → couvre les 24h du samedi et du dimanche.
    - name: "Week-end"
      price_per_kwh: 0.12
      start_time: "00:00"
      end_time:   "00:00"       # toute la journée
      days_of_week: [6,7]       # 6=Samedi, 7=Dimanche

    # ── Exemple optionnel : nuit week-end encore moins chère ──────────────
    # Décommenter pour différencier nuit/jour le week-end.
    # ATTENTION : si activé avec le slot "Week-end" ci-dessus, il y aura
    # chevauchement sur les plages 22h→6h du week-end. Choisir l'un ou l'autre.
    #
    # - name: "Nuit Week-end"
    #   price_per_kwh: 0.07
    #   start_time: "22:00"
    #   end_time:   "06:00"
    #   days_of_week: [5,6,7]   # 5=vendredi, 6=samedi, 7=dimanche
    #
    # - name: "Jour Week-end"
    #   price_per_kwh: 0.12
    #   start_time: "06:00"
    #   end_time:   "22:00"
    #   days_of_week: [6,7]

# ── Base de données MariaDB ────────────────────────────────────────────────────
database:
  connection_string: "Server=mariadb;Port=3306;Database=solar_distribution;User=solar_user;Password=solarpass;CharSet=utf8mb4;"

# ── ML.NET ─────────────────────────────────────────────────────────────────────
ml:
  model_directory: "/data/ml_models"

  # Délai avant de relire le SOC réel pour évaluer une session.
  # 4h = on attend 4h après la décision pour voir l'effet réel.
  feedback_delay_hours: 4.0

  # Fréquence de vérification des feedbacks en attente (heures).
  feedback_check_interval_hours: 1.0

  # Cron pour le ré-entraînement automatique.
  # "0 3 * * 0" = dimanche à 3h UTC (recommandé)
  retrain_cron: "0 3 * * 0"

  # Feedbacks valides minimum avant le premier entraînement.
  # ~2 jours à 1 cycle/min = 2880 sessions, avec feedback_delay=4h → 50 valides en 2j.
  min_feedback_for_retrain: 50

# ── Logging ────────────────────────────────────────────────────────────────────
#
# Trois destinations disponibles (toutes indépendantes, combinables) :
#
#   1. Console   — toujours actif (docker logs / stdout)
#                  Format lisible : [HH:mm:ss INF] Message...
#
#   2. Fichier   — rolling daily, conserve 14 jours
#                  Format : JSON structuré (JsonFormatter)
#                  → chaque ligne = 1 objet JSON avec Timestamp, Level,
#                    RenderedMessage, Properties (SourceContext, etc.)
#
#   3. Loki      — push HTTP batch vers Grafana Loki
#                  Format : JSON structuré (même formatter que fichier)
#                  → visible dans Grafana via LogQL :
#                      {app="solar-worker"} | json | level="Error"
#
# ── Niveau global ──────────────────────────────────────────────────────────────
#   Debug | Information | Warning | Error
#   Note : Microsoft.*, EntityFrameworkCore, Polly sont silencés en Warning
#          quel que soit ce réglage (évite le bruit HTTP interne).
logging:
  level: "Information"

  # ── Fichier rolling (JSON structuré) ─────────────────────────────────────
  # Laisser vide ou commenter pour désactiver.
  # Le fichier tourne chaque jour et conserve 14 jours d'historique.
  # Exemple JSON d'un log :
  #   {
  #     "Timestamp": "2025-06-15T08:32:11.453+02:00",
  #     "Level": "Information",
  #     "MessageTemplate": "Cycle #{Cycle} — surplus {SurplusW} W",
  #     "RenderedMessage": "Cycle #42 — surplus 712 W",
  #     "Properties": { "Cycle": 42, "SurplusW": 712, "SourceContext": "SolarWorker" }
  #   }
  file_path: "/data/logs/solar-worker.log"

  # ── Loki — push JSON structuré ────────────────────────────────────────────
  # URL de base de votre instance Loki (sans chemin, sans trailing slash).
  # Le sink utilise l'endpoint POST /loki/api/v1/push automatiquement.
  #
  # Exemples :
  #   Docker Compose  : "http://loki:3100"
  #   Réseau local    : "http://192.168.1.50:3100"
  #   Grafana Cloud   : "https://<user>:<token>@logs-prod-xxx.grafana.net"
  #
  # Laisser vide ou commenter pour désactiver.
  loki_url: "http://loki:3100"

  # ── Labels Loki ───────────────────────────────────────────────────────────
  # Paires clé/valeur attachées à chaque log stream Loki.
  # Permettent de filtrer dans Grafana via LogQL :
  #   {app="solar-worker"}                     → tous les logs
  #   {app="solar-worker", env="prod"}          → prod uniquement
  #   {app="solar-worker"} | json | level="Error"  → erreurs seulement
  #
  # IMPORTANT : Loki indexe ces labels — gardez-en peu (< 10) et à cardinalité
  # faible (pas de timestamp ou d'ID dans les labels !).
  loki_labels:
    job: "solar-worker"
    env: "prod"               # ← adapter : dev | staging | prod